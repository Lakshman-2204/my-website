<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Delivery Tracking — MyStore</title>
   <!-- Leaflet (OpenStreetMap) — free, no API key, no billing -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
   <!-- Supabase -->
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="supabase.js"></script>
   <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
         font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
         display: flex; flex-direction: column; overflow: hidden;
         height: 100vh; height: 100dvh;   /* dvh handles mobile browser chrome */
      }
      #topbar { flex: 0 0 auto; padding: 10px 14px; background: #111c33; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      #topbar h1 { font-size: 1rem; margin: 0; }
      #topbar .sub { font-size: 0.75rem; color: #94a3b8; }
      #map { flex: 1 1 auto; min-height: 0; width: 100%; }   /* min-height:0 lets it shrink to fit */
      #panel { flex: 0 0 auto; padding: 10px 14px; background: #111c33; font-size: 0.85rem; max-height: 42vh; overflow-y: auto; }
      .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
      .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
      .badge { display:inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700; }
      button { font-family: inherit; cursor: pointer; }
      .btn-share { background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 700; font-size: 0.9rem; }
      .btn-stop  { background: #dc2626; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 700; font-size: 0.9rem; }
      .muted { color: #94a3b8; }
   </style>
</head>
<body>
   <div id="topbar">
      <div>
         <h1 id="title">🚚 Delivery Tracking</h1>
         <div class="sub" id="orderline">Loading…</div>
      </div>
      <div id="statusBadge"></div>
   </div>

   <div id="map"></div>

   <div id="panel">
      <div class="row"><span class="dot" style="background:#2563eb"></span> <span>Store / Branch</span> <span class="muted" id="storeAddr"></span></div>
      <div class="row"><span class="dot" style="background:#16a34a"></span> <span>Delivery address</span> <span class="muted" id="custAddr"></span></div>
      <div class="row"><span style="font-size:16px;line-height:1">🏍️</span> <span>Delivery person</span> <span class="muted" id="driverInfo">— waiting for location —</span></div>
      <div id="driverControls" style="margin-top:10px"></div>
      <div id="etaLine" style="margin-top:8px" class="muted"></div>
   </div>

<script>
(function () {
   var params   = new URLSearchParams(location.search);
   var orderId  = params.get('order') || '';
   var storeParam  = params.get('store') || '';       // store_provider_id (no order needed)
   var branchParam = params.get('branch') || '';      // optional specific branch
   var isDriver = params.get('role') === 'driver';
   var isLocate = params.get('role') === 'locate' || (!orderId && !!storeParam);  // just show/route to a store
   var isPickup = params.get('role') === 'pickup' || isLocate;   // customer walks/drives to the store
   // Where the road route should end: store for pickup, customer address for delivery
   function routeDest() { return isPickup ? storeLL : custLL; }

   var map, storeMarker, custMarker, driverMarker, routeLine;
   var storeLL = null, custLL = null;
   var watchId = null, pushTimer = null, lastPos = null;

   // ── Geocoding via OpenStreetMap Nominatim (free, cached in localStorage) ──
   async function geocode(addr) {
      if (!addr) return null;
      var key = 'geo:' + addr.toLowerCase().trim();
      try { var c = localStorage.getItem(key); if (c) return JSON.parse(c); } catch (e) {}
      try {
         var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(addr);
         var res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
         var arr = await res.json();
         if (arr && arr.length) {
            var ll = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
            try { localStorage.setItem(key, JSON.stringify(ll)); } catch (e) {}
            return ll;
         }
      } catch (e) { console.warn('geocode failed', e); }
      return null;
   }

   function addrToStr(a) {
      if (!a) return '';
      return [a.line, a.line1, a.line2, a.area, a.city, a.state, a.pin, a.pincode].filter(Boolean).join(', ');
   }

   function icon(color) {
      return L.divIcon({
         className: '', iconSize: [22, 22], iconAnchor: [11, 11],
         html: '<div style="width:20px;height:20px;border-radius:50%;background:' + color + ';border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>'
      });
   }
   // Orange bike marker for the delivery person
   function bikeIcon() {
      return L.divIcon({
         className: '', iconSize: [38, 38], iconAnchor: [19, 19], popupAnchor: [0, -18],
         html: '<div style="width:36px;height:36px;border-radius:50%;background:#f97316;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1">🏍️</div>'
      });
   }
   var COL_STORE = '#2563eb', COL_CUST = '#16a34a', COL_BIKE = '#f97316';

   function fitAll() {
      var pts = [];
      if (storeLL)  pts.push([storeLL.lat, storeLL.lng]);
      if (custLL)   pts.push([custLL.lat, custLL.lng]);
      if (lastPos)  pts.push([lastPos.lat, lastPos.lng]);
      if (pts.length === 1) map.setView(pts[0], 14);
      else if (pts.length > 1) map.fitBounds(pts, { padding: [40, 40] });
   }

   function drawRoute() {
      // Faint straight reference store → customer (the real road route is drawn separately)
      if (routeLine) map.removeLayer(routeLine);
      if (storeLL && custLL) {
         routeLine = L.polyline([[storeLL.lat, storeLL.lng], [custLL.lat, custLL.lng]],
            { color: '#64748b', weight: 2, opacity: 0.35, dashArray: '4 8' }).addTo(map);
      }
   }

   // Real ROAD route via OSRM (free, no key). Draws driver → customer along roads.
   var roadLine = null, _lastRouteAt = 0;
   async function drawRoadRoute(from, to) {
      if (!from || !to) return;
      try {
         var url = 'https://router.project-osrm.org/route/v1/driving/' +
            from.lng + ',' + from.lat + ';' + to.lng + ',' + to.lat + '?overview=full&geometries=geojson';
         var res = await fetch(url);
         var d = await res.json();
         if (d && d.routes && d.routes.length) {
            var coords = d.routes[0].geometry.coordinates.map(function (c) { return [c[1], c[0]]; });
            if (roadLine) map.removeLayer(roadLine);
            roadLine = L.polyline(coords, { color: COL_BIKE, weight: 5, opacity: 0.85 }).addTo(map);
            var km  = (d.routes[0].distance / 1000).toFixed(1);
            var min = Math.round(d.routes[0].duration / 60);
            note('🛣️ ' + km + ' km · ~' + min + ' min by road to the delivery address');
         }
      } catch (e) { console.warn('route failed', e); }
   }

   function haversineKm(a, b) {
      var R = 6371, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
      var s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
   }

   // Open the phone's maps app for real turn-by-turn voice navigation.
   // Delivery → drive to the customer; Pickup → drive to the store.
   window.__navigate = function () {
      var d = routeDest();
      if (!d) { alert((isPickup ? 'Store' : 'Delivery') + ' location not available yet.'); return; }
      window.open('https://www.google.com/maps/dir/?api=1&destination=' + d.lat + ',' + d.lng + '&travelmode=driving', '_blank');
   };

   function updateDriver(lat, lng, ts) {
      lastPos = { lat: lat, lng: lng };
      var ll = [lat, lng];
      if (!driverMarker) driverMarker = L.marker(ll, { icon: bikeIcon() }).addTo(map).bindPopup('🏍️ Delivery person');
      else driverMarker.setLatLng(ll);
      var when = ts ? new Date(ts).toLocaleTimeString() : 'just now';
      document.getElementById('driverInfo').textContent = 'Live · updated ' + when;
      // Recompute the road route at most every 15s (avoid hammering OSRM)
      var _dest = routeDest();
      if (_dest) {
         var now = Date.now();
         if (now - _lastRouteAt > 15000) { _lastRouteAt = now; drawRoadRoute(lastPos, _dest); }
      }
   }

   function setStatus(txt, color) {
      var b = document.getElementById('statusBadge');
      b.innerHTML = '<span class="badge" style="background:' + (color || '#334155') + ';color:#fff">' + txt + '</span>';
   }

   function note(msg, color) {
      var el = document.getElementById('etaLine');
      if (el) el.innerHTML = '<span style="color:' + (color || '#94a3b8') + '">' + msg + '</span>';
   }

   // ── Driver mode: accept → auto-share GPS (no stop; owner stays informed) ──
   var _pushErrShown = false, _sharing = false;
   function startSharing() {
      if (_sharing) return;
      if (!navigator.geolocation) { alert('Location not supported on this device.'); return; }
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
         alert('Live location needs a secure (https) page. Open this link over https.'); return;
      }
      _sharing = true;
      setStatus('Getting location…', '#16a34a');
      note('Requesting location permission… please tap "Allow".');
      // Locked "sharing active" state — no stop button (owner can always see the rider)
      document.getElementById('driverControls').innerHTML =
         '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:stretch">' +
            '<div style="flex:1;min-width:150px;background:#052e16;color:#4ade80;border:1px solid #166534;border-radius:8px;padding:10px;font-weight:800;text-align:center">🟢 Delivery accepted · sharing live location</div>' +
            '<button onclick="__navigate()" style="flex:1;min-width:150px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:0.9rem;cursor:pointer">🧭 Navigate (voice)</button>' +
         '</div>' +
         '<div class="muted" style="margin-top:6px">Keep this page open until the delivery is complete.</div>';
      // Mark accepted immediately so the owner sees it even before the first GPS fix
      AppDB.upsertDeliveryLocation(orderId, (lastPos && lastPos.lat) || null, (lastPos && lastPos.lng) || null, 'en_route');
      watchId = navigator.geolocation.watchPosition(function (p) {
         lastPos = { lat: p.coords.latitude, lng: p.coords.longitude };
         updateDriver(lastPos.lat, lastPos.lng, Date.now());
         setStatus('Sharing live location', '#16a34a');
         fitAll();
      }, function (err) {
         console.warn(err); setStatus('Location blocked', '#dc2626');
         note('❌ Location ' + (err && err.code === 1 ? 'permission denied — enable location for this site and reopen the link.' : 'unavailable. Move to open sky / enable GPS.'), '#fca5a5');
      }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
      // Push to Supabase every 5s (status stays en_route — no stopping)
      pushTimer = setInterval(async function () {
         if (!lastPos) return;
         var ok = await AppDB.upsertDeliveryLocation(orderId, lastPos.lat, lastPos.lng, 'en_route');
         if (!ok && !_pushErrShown) {
            _pushErrShown = true;
            note('⚠️ Could not save location to server. Make sure the delivery_tracking table exists (run the SQL) and Realtime is on.', '#fca5a5');
         }
      }, 5000);
   }
   window.__accept = startSharing;

   async function init() {
      if (!orderId && !storeParam) { document.getElementById('orderline').textContent = 'No order or store specified.'; return; }
      document.getElementById('title').textContent = isDriver ? '🚚 Share Delivery Location' : (isPickup ? '🏪 Route to Store' : '📍 Track Your Delivery');
      if (isPickup) {
         // Relabel the legend for the pickup case (customer → store)
         document.getElementById('custAddr').parentElement.style.display = 'none';
         var di = document.getElementById('driverInfo');
         if (di) { di.parentElement.querySelector('span:nth-child(2)').textContent = 'You'; di.textContent = '— getting your location —'; }
      }

      map = L.map('map').setView([20.5937, 78.9629], 5);   // India default
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
         maxZoom: 19, attribution: '© OpenStreetMap'
      }).addTo(map);
      setTimeout(function () { map.invalidateSize(); }, 150);   // flex layout settled
      window.addEventListener('resize', function () { if (map) map.invalidateSize(); });
      window.addEventListener('orientationchange', function () { setTimeout(function () { if (map) map.invalidateSize(); }, 250); });

      // Resolve store/branch address + customer address
      var branches = [], provs = [];
      try { branches = await AppDB.getAllStoreBranches(); } catch (e) {}
      try { provs = await AppDB.getStoreProviders(); } catch (e) {}

      var order = null, branch = null, store = {}, custAddrStr = '';
      if (orderId) {
         order = await AppDB.getOrderById(orderId);
         if (!order) { document.getElementById('orderline').textContent = 'Order not found.'; return; }
         document.getElementById('orderline').textContent = orderId + ' · ' + (order.customerName || 'Customer');
         branch = order.branch_id ? branches.find(function (b) { return b.id === order.branch_id; }) : null;
         store  = provs.find(function (p) { return p.id === order.store_provider_id; }) || {};
         custAddrStr = addrToStr(order.delivery_address);
      } else {
         // Locate mode: resolve directly from store/branch params, no order.
         store  = provs.find(function (p) { return p.id === storeParam; }) || {};
         branch = branchParam ? branches.find(function (b) { return b.id === branchParam; })
                              : branches.find(function (b) { return b.store_provider_id === storeParam && b.is_main; })
                              || branches.find(function (b) { return b.store_provider_id === storeParam; });
         document.getElementById('orderline').textContent = (store.name || 'Store') + (branch && branch.branch_label ? ' · ' + branch.branch_label : '');
      }

      var storeAddrStr = (branch && (branch.address || (branch.details && branch.details.address))) || store.address || '';
      document.getElementById('storeAddr').textContent = storeAddrStr || '—';
      document.getElementById('custAddr').textContent  = custAddrStr || '—';

      // Prefer the exact pin the owner set for the branch; else geocode its address.
      var bd = (branch && branch.details) || {};
      storeLL = (bd.lat != null && bd.lng != null) ? { lat: Number(bd.lat), lng: Number(bd.lng) } : await geocode(storeAddrStr);
      // Prefer the exact lat/lng the customer pinned on the map; else geocode.
      var da = (order && order.delivery_address) || {};
      custLL = (da.lat != null && da.lng != null) ? { lat: Number(da.lat), lng: Number(da.lng) } : (custAddrStr ? await geocode(custAddrStr) : null);
      if (storeLL) storeMarker = L.marker([storeLL.lat, storeLL.lng], { icon: icon(COL_STORE) }).addTo(map).bindPopup('🏬 ' + (store.name || 'Store'));
      if (custLL)  custMarker  = L.marker([custLL.lat, custLL.lng],  { icon: icon(COL_CUST) }).addTo(map).bindPopup('🏠 Delivery address');
      drawRoute();
      fitAll();

      if (isPickup) {
         // Customer heading to the store: track THEIR phone locally (no server push),
         // draw the road route from them to the store, and offer voice navigation.
         setStatus('Locating you…', '#16a34a');
         if (!navigator.geolocation) { note('Location not supported on this device.', '#fca5a5'); }
         document.getElementById('driverControls').innerHTML =
            '<button onclick="__navigate()" style="width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:14px;font-weight:700;font-size:1rem;cursor:pointer">🧭 Navigate to Store (voice)</button>' +
            '<div class="muted" style="margin-top:8px">Blue = store. The orange line is your road route to the store.</div>';
         if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function (p) {
               updateDriver(p.coords.latitude, p.coords.longitude, Date.now());
               setStatus('Routing to store', '#16a34a');
               fitAll();
            }, function (err) {
               setStatus('Location blocked', '#dc2626');
               note('❌ Location ' + (err && err.code === 1 ? 'permission denied — allow location to see your route. You can still tap Navigate.' : 'unavailable. Tap Navigate to open maps.'), '#fca5a5');
               if (storeLL) map.setView([storeLL.lat, storeLL.lng], 15);
            }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
         }
      } else if (isDriver) {
         // Draw the initial road route from the store to the customer (until GPS starts)
         if (storeLL && custLL) drawRoadRoute(storeLL, custLL);
         // If this delivery was already accepted earlier, auto-resume sharing so a
         // page reload doesn't require re-accepting (and can't be used to stop it).
         var existing = await AppDB.getDeliveryLocation(orderId);
         if (existing && existing.status === 'en_route') {
            startSharing();
         } else {
            document.getElementById('driverControls').innerHTML =
               '<button class="btn-share" style="width:100%;font-size:1rem;padding:14px" onclick="__accept()">✅ Accept Delivery &amp; Start</button>' +
               '<div class="muted" style="margin-top:8px">Tap Accept to take this delivery. Your live location will be shared with the store until the order is delivered.</div>';
         }
      } else {
         // Customer view: load last known + subscribe to live updates
         setStatus('Waiting for driver…', '#334155');
         var last = await AppDB.getDeliveryLocation(orderId);
         if (last && last.lat != null) { updateDriver(last.lat, last.lng, last.updated_at); setStatus(last.status === 'en_route' ? 'On the way' : (last.status || 'Tracking'), '#16a34a'); fitAll(); }
         AppDB.subscribeDeliveryLocation(orderId, function (row) {
            if (row && row.lat != null) { updateDriver(row.lat, row.lng, row.updated_at); setStatus(row.status === 'stopped' ? 'Paused' : 'On the way', row.status === 'stopped' ? '#334155' : '#16a34a'); }
         });
      }
   }

   window.addEventListener('load', init);
})();
</script>
</body>
</html>
