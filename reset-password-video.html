<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Set New Password — MyStore</title>
      <link rel="stylesheet" href="style.css"/>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="supabase.js"></script>
      <style>
         body.auth-page { background: #1a1a2e; }
         .auth-bg-video {
            position: fixed; inset: 0; z-index: -2;
            width: 100vw; height: 100vh;
            object-fit: cover;
            pointer-events: none;
         }
         .auth-bg-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
         }
         .auth-box {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
         }
      </style>
   </head>
   <body class="auth-page">
      <video class="auth-bg-video" autoplay muted loop playsinline preload="auto">
         <source src="bg.mp4" type="video/mp4"/>
      </video>
      <div class="auth-bg-overlay"></div>

      <div class="auth-box" id="resetBox">
         <h1>Set New Password</h1>
         <p class="subtitle" id="resetIntro">Verifying reset link…</p>

         <div id="resetForm" style="display:none">
            <div class="form-group">
               <label>New Password</label>
               <div class="pw-wrap">
                  <input type="password" id="resetNew" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkPwMatch('resetNew','resetConfirm')"/>
                  <button type="button" class="pw-toggle" onclick="togglePassword('resetNew', this)" title="Show password">👁</button>
               </div>
            </div>
            <div class="form-group">
               <label>Confirm New Password</label>
               <div class="pw-wrap">
                  <input type="password" id="resetConfirm" placeholder="Repeat password" autocomplete="new-password" oninput="checkPwMatch('resetNew','resetConfirm')"/>
                  <button type="button" class="pw-toggle" onclick="togglePassword('resetConfirm', this)" title="Show password">👁</button>
               </div>
            </div>
            <p id="resetMsg" class="error-msg hidden"></p>
            <button class="btn-primary" onclick="completePasswordReset()">🔒 Update Password</button>
         </div>

         <p class="switch-link" style="margin-top:1rem">
            <a href="login-video.html">← Back to login</a>
         </p>
      </div>
      <script src="script.js"></script>
      <script>initPasswordResetPage();</script>
   </body>
</html>
