<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>Shop Dashboard — MyStore</title>
   <link rel="stylesheet" href="style.css"/>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="supabase.js"></script>
</head>
<body class="shopowner-page">

   <!-- HEADER -->
   <div class="shop-header">
      <div class="shop-header-left">
         <div class="shop-site-name">myWebsite</div>
      </div>
      <div class="shop-header-center">
         <div class="shop-business-name" id="shopBusinessName"></div>
         <div class="shop-owner-name" id="shopOwnerName"></div>
      </div>
      <div class="shop-header-right">
         <button class="shop-logout-btn" onclick="logout()">Logout</button>
      </div>
   </div>

   <!-- Internal shop announcement (admin-controlled) -->
   <div class="announcement-bar hidden" id="shopAnnouncementBar"></div>

   <!-- TOP-LEVEL TABS: Orders / Appointments / My Products
        All hidden by default — checkShopOwnerLogin reveals only the ones this user owns. -->
   <div class="shop-main-tabs">
      <button class="shop-main-tab hidden" id="shop-tab-orders"       onclick="switchShopTab('orders')">📋 Orders</button>
      <button class="shop-main-tab hidden" id="shop-tab-appointments" onclick="switchShopTab('appointments')">📅 Appointments</button>
      <button class="shop-main-tab hidden" id="shop-tab-doctors"      onclick="switchShopTab('doctors')">👨‍⚕️ Doctors</button>
      <button class="shop-main-tab hidden" id="shop-tab-products"     onclick="switchShopTab('products')">🛍️ My Products <button class="shop-add-prod-btn" onclick="event.stopPropagation();openStoreProductModal(-1)">➕ Add</button></button>
   </div>

   <!-- ORDERS PANEL (hidden until checkShopOwnerLogin decides) -->
   <div id="shop-panel-orders" class="hidden">

   <!-- STATS BAR -->
   <div class="shop-stats-bar">
      <div class="shop-stat" onclick="renderShopDashboard('Pending Pickup')">
         <div class="shop-stat-num" id="statPending">0</div>
         <div class="shop-stat-label">Pending</div>
      </div>
      <div class="shop-stat" onclick="renderShopDashboard('Ready')">
         <div class="shop-stat-num" id="statReady">0</div>
         <div class="shop-stat-label">Ready</div>
      </div>
      <div class="shop-stat" onclick="renderShopDashboard('Completed')">
         <div class="shop-stat-num" id="statCompleted">0</div>
         <div class="shop-stat-label">Completed</div>
      </div>
   </div>

   <!-- SEARCH BAR -->
   <div class="shop-search-bar">
      <input type="text" id="shopSearchInput" placeholder="🔍 Enter Order ID to look up..."
             oninput="lookupOrder()" autocomplete="off"/>
   </div>

   <!-- FILTER TABS -->
   <div class="shop-tabs" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
         <button class="shop-tab active" id="tab-all" data-filter="" onclick="renderShopDashboard()">All Orders</button>
         <button class="shop-tab" id="tab-Pending Pickup" data-filter="Pending Pickup" onclick="renderShopDashboard('Pending Pickup')">⏳ Pending</button>
         <button class="shop-tab" id="tab-Ready" data-filter="Ready" onclick="renderShopDashboard('Ready')">✅ Ready</button>
         <button class="shop-tab" id="tab-Completed" data-filter="Completed" onclick="renderShopDashboard('Completed')">🏁 Completed</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
         <select id="shopOrderDateFilter" class="admin-filter-select" onchange="renderShopDashboard(window._shopCurrentFilter)">
            <option value="all">📅 All time</option>
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="month">This Month</option>
            <option value="year">This Year</option>
            <option value="custom">📆 Custom date…</option>
         </select>
         <input type="date" id="shopOrderCustomDate" class="admin-filter-select" style="display:none" onchange="renderShopDashboard(window._shopCurrentFilter)"/>
      </div>
   </div>

   <!-- ORDER LIST -->
   <div class="shop-order-list" id="shopOrderList">
      <div class="shop-empty">No orders yet. Waiting for customers to place orders.</div>
   </div>

   </div><!-- /shop-panel-orders -->

   <!-- APPOINTMENTS PANEL -->
   <div id="shop-panel-appointments" class="hidden">
      <div class="shop-stats-bar">
         <div class="shop-stat" onclick="renderShopAppointments('Confirmed')">
            <div class="shop-stat-num" id="statAptConfirmed">0</div>
            <div class="shop-stat-label">Confirmed</div>
         </div>
         <div class="shop-stat" onclick="renderShopAppointments('Completed')">
            <div class="shop-stat-num" id="statAptCompleted">0</div>
            <div class="shop-stat-label">Completed</div>
         </div>
         <div class="shop-stat" onclick="renderShopAppointments('Cancelled')">
            <div class="shop-stat-num" id="statAptCancelled">0</div>
            <div class="shop-stat-label">Cancelled</div>
         </div>
      </div>
      <div class="shop-tabs" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
         <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="shop-tab active" id="apt-tab-all"       data-filter=""          onclick="renderShopAppointments()">All</button>
            <button class="shop-tab"        id="apt-tab-Confirmed" data-filter="Confirmed" onclick="renderShopAppointments('Confirmed')">⏳ Confirmed</button>
            <button class="shop-tab"        id="apt-tab-Completed" data-filter="Completed" onclick="renderShopAppointments('Completed')">✅ Completed</button>
            <button class="shop-tab"        id="apt-tab-Cancelled" data-filter="Cancelled" onclick="renderShopAppointments('Cancelled')">✕ Cancelled</button>
         </div>
         <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <select id="shopAptDoctorFilter" class="admin-filter-select" onchange="renderShopAppointments(window._shopAptCurrentFilter)">
               <option value="">👨‍⚕️ All doctors</option>
            </select>
            <select id="shopAptDateFilter" class="admin-filter-select" onchange="renderShopAppointments(window._shopAptCurrentFilter)">
               <option value="all">📅 All time</option>
               <option value="today">Today</option>
               <option value="week">This Week</option>
               <option value="month">This Month</option>
               <option value="year">This Year</option>
               <option value="custom">📆 Custom date…</option>
            </select>
            <input type="date" id="shopAptCustomDate" class="admin-filter-select" style="display:none" onchange="renderShopAppointments(window._shopAptCurrentFilter)"/>
         </div>
      </div>
      <div class="shop-order-list" id="shopAppointmentList">
         <div class="shop-empty">Loading…</div>
      </div>
   </div>

   <!-- DOCTORS PANEL -->
   <div id="shop-panel-doctors" class="hidden">
      <div id="shopDoctorsContent">
         <div class="shop-empty">Loading…</div>
      </div>
   </div>

   <!-- DOCTOR EDIT MODAL (same IDs as admin's so saveAptDoctor can be reused) -->
   <div class="admin-modal-overlay hidden" id="aptDoctorModal" onclick="if(event.target===this)closeAptDoctorModal()">
      <div class="admin-modal">
         <div class="admin-modal-header">
            <h3 id="aptDoctorModalTitle">Add</h3>
            <button class="admin-modal-close" onclick="closeAptDoctorModal()">✕</button>
         </div>
         <div class="admin-modal-body">
            <div class="modal-field">
               <label>Name</label>
               <input type="text" id="aptDocName" placeholder="Dr. Ramesh Kumar"/>
            </div>
            <div class="modal-field">
               <label>Speciality / Service</label>
               <input type="text" id="aptDocSpec" placeholder="General Physician"/>
            </div>
            <div class="modal-field">
               <label>Qualification / Experience</label>
               <input type="text" id="aptDocQual" placeholder="MBBS, MD"/>
            </div>
            <div class="modal-field">
               <label>Consultation Fee (₹)</label>
               <input type="number" id="aptDocFee" min="0" placeholder="500"/>
            </div>
            <label class="apt-form-label" style="margin-top:6px">Weekly Availability</label>
            <p style="font-size:0.78rem;color:#888;margin-bottom:6px">Format: <code>09:00-12:00, 14:00-18:00</code> or <code>off</code></p>
            <div id="aptDocAvail"></div>
            <input type="hidden" id="aptDocProviderId"/>
            <input type="hidden" id="aptDocId"/>
         </div>
         <div class="admin-modal-footer">
            <button class="admin-modal-btn-cancel" onclick="closeAptDoctorModal()">Cancel</button>
            <button class="admin-modal-btn-save"   onclick="saveAptDoctor()">💾 Save</button>
         </div>
      </div>
   </div>

   <!-- PRODUCTS PANEL -->
   <div id="shop-panel-products" class="hidden">
      <div class="shop-prods-header">
         <h3>My Products</h3>
         <button class="shop-btn-add-prod" onclick="openStoreProductModal(-1)">➕ Add Product</button>
      </div>
      <div id="shopProductList" class="shop-product-list"></div>
   </div>

   <!-- ADD/EDIT PRODUCT MODAL -->
   <div class="sp-modal-overlay hidden" id="shopProductModal" onclick="if(event.target===this)closeStoreProductModal()">
      <div class="sp-modal">
         <div class="sp-modal-header">
            <h3 id="sp-modal-title">Add Product</h3>
            <button onclick="closeStoreProductModal()">✕</button>
         </div>
         <div class="sp-modal-body">
            <img id="sp-img-preview" src="https://placehold.co/200x120?text=Preview" style="width:100%;border-radius:8px;margin-bottom:12px;object-fit:cover;max-height:140px"/>
            <div class="sp-field"><label>Image URL</label><input type="text" id="sp-img" placeholder="https://..." oninput="previewStoreProductImg()"/></div>
            <div class="sp-field"><label>Product Name</label><input type="text" id="sp-name" placeholder="Product name"/></div>
            <div class="sp-field"><label>Price (₹)</label><input type="number" id="sp-price" placeholder="0" min="0"/></div>
            <div class="sp-field"><label>Description</label><input type="text" id="sp-desc" placeholder="Short description"/></div>
            <div class="sp-field"><label>Badge</label><input type="text" id="sp-badge" placeholder="New, Hot, Sale..."/></div>
            <div class="sp-field">
               <label>Category</label>
               <select id="sp-catkey">
                  <option value="groceries">Daily Needs — Groceries</option>
                  <option value="vegetables">Daily Needs — Vegetables</option>
                  <option value="dairy">Daily Needs — Dairy</option>
                  <option value="flowers">Flowers</option>
                  <option value="sofa">Home — Sofas</option>
                  <option value="clothing">Clothing</option>
                  <option value="electronics">Electronics</option>
                  <option value="medicines">Health</option>
                  <option value="utensils">Kitchen</option>
                  <option value="stationery">Stationery</option>
               </select>
            </div>
         </div>
         <div class="sp-modal-footer">
            <button class="sp-btn-save" onclick="saveStoreProduct()">💾 Save Product</button>
            <button class="sp-btn-cancel" onclick="closeStoreProductModal()">Cancel</button>
         </div>
      </div>
   </div>

   <script src="script.js"></script>
   <script>
      checkShopOwnerLogin();
   </script>
</body>
</html>
