<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Sign Up</title>
      <link rel="stylesheet" href="style.css"/>
   </head>
   <body class="auth-page">
      <div class="auth-box">
         <h1>Create Account</h1>
         <p class="subtitle">Sign up to get started</p>
         <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="firstname lastname"/>
         </div>
         <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="gajula@example.com"/>
         </div>
         <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters"/>
         </div>
         <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="signupConfirm" placeholder="Repeat password"/>
         </div>
         <div class="form-group">
            <label>I am a</label>
            <div class="role-selector">
               <label class="role-option" id="role-customer-label">
                  <input type="radio" name="userRole" id="role-customer" value="customer" checked/>
                  <div class="role-card">
                     <div class="role-icon">🛍️</div>
                     <div class="role-name">Customer</div>
                     <div class="role-desc">Browse & order products</div>
                  </div>
               </label>
               <label class="role-option" id="role-owner-label">
                  <input type="radio" name="userRole" id="role-storeowner" value="storeowner"/>
                  <div class="role-card">
                     <div class="role-icon">🏪</div>
                     <div class="role-name">Store Owner</div>
                     <div class="role-desc">Manage incoming orders</div>
                  </div>
               </label>
            </div>
         </div>
         <button class="btn-primary" onclick="signUp()">Create Account</button>
         <p class="switch-link">
            Already have an account? <a href="login.html">Login here</a>
         </p>
      </div>
      <script src="script.js"></script>
   </body>
</html>
