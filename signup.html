<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>Sign Up — MyStore</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="style.css"/>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="supabase.js"></script>
   <style>
      html, body { height: 100%; margin: 0; padding: 0; }
      .auth-bg-video {
         position: fixed; inset: 0; z-index: -2;
         width: 100vw; height: 100vh;
         object-fit: cover; pointer-events: none;
      }
      .auth-bg-overlay {
         position: fixed; inset: 0; z-index: -1;
         background: rgba(0,0,0,0.55); pointer-events: none;
      }
      @keyframes gradBorderShift {
         0%   { background-position: 0% 50%; }
         50%  { background-position: 100% 50%; }
         100% { background-position: 0% 50%; }
      }
      .animated-border::before {
         content: ''; position: absolute; inset: -2px; border-radius: 1.25rem;
         padding: 2px;
         background: linear-gradient(135deg, #06b6d4 0%, #6366f1 40%, #06b6d4 100%);
         background-size: 300% 300%;
         -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
         -webkit-mask-composite: xor; mask-composite: exclude;
         pointer-events: none;
         animation: gradBorderShift 5s linear infinite;
      }
      body .auth-card .btn-primary {
         width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 0.95rem;
         font-weight: 700; cursor: pointer; transition: all 0.2s;
         background: linear-gradient(135deg, #0891b2, #4f46e5);
         color: #fff; box-shadow: 0 4px 16px rgba(6,182,212,0.35);
      }
      body .auth-card .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
      body .auth-card input[type="email"],
      body .auth-card input[type="password"],
      body .auth-card input[type="text"],
      body .auth-card input[type="tel"] {
         width: 100%; padding: 11px 14px; border: 1px solid rgba(255,255,255,0.2);
         border-radius: 9px; font-size: 0.92rem; outline: none;
         background: rgba(255,255,255,0.9); color: #1e293b;
         box-sizing: border-box; transition: border-color 0.2s;
      }
      body .auth-card input:focus { border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
      body .auth-card .pw-wrap { position: relative; }
      body .auth-card .pw-toggle {
         position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
         background: none; border: none; cursor: pointer; font-size: 1rem;
      }
      body .auth-card .error-msg { color: #fca5a5; font-size: 0.82rem; margin: 4px 0 0; }
      body .auth-card .error-msg.hidden { display: none; }
      /* Role selector */
      .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .role-option { cursor: pointer; }
      .role-option input[type="radio"] { display: none; }
      .role-card {
         background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.18);
         border-radius: 12px; padding: 14px 10px; text-align: center;
         transition: all 0.2s; cursor: pointer;
      }
      .role-card:hover { background: rgba(6,182,212,0.15); border-color: #06b6d4; }
      .role-option input[type="radio"]:checked + .role-card {
         background: rgba(6,182,212,0.22); border-color: #06b6d4;
         box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
      }
      .role-icon { font-size: 1.6rem; margin-bottom: 6px; }
      .role-name { color: #fff; font-weight: 700; font-size: 0.85rem; }
      .role-desc { color: rgba(255,255,255,0.6); font-size: 0.72rem; margin-top: 2px; line-height: 1.4; }
   </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:#0f172a">
   <video class="auth-bg-video" autoplay muted loop playsinline preload="auto">
      <source src="Dolphins_playing_in_sea_202605311737.mp4" type="video/mp4"/>
   </video>
   <div class="auth-bg-overlay"></div>

   <!-- Signup Card -->
   <div class="auth-card animated-border relative w-full max-w-sm rounded-2xl p-8 shadow-2xl"
        id="signupBox"
        style="background:rgba(15,23,42,0.75);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.12)">
      <div class="text-center mb-6">
         <div class="inline-flex items-center gap-1.5 bg-slate-800 text-white px-4 py-1.5 rounded-xl font-black text-lg mb-4">
            MyStore<span class="text-cyan-400 text-xl">+</span>
         </div>
         <h1 class="text-2xl font-black text-white tracking-tight">Create Account</h1>
         <p class="text-slate-400 text-sm mt-1">Sign up to get started</p>
      </div>

      <div class="space-y-4">
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Full Name</label>
            <input type="text" id="signupName" placeholder="firstname lastname"/>
         </div>
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com"/>
         </div>
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Password</label>
            <div class="pw-wrap">
               <input type="password" id="signupPassword" placeholder="Min 6 characters"
                      oninput="checkPwMatch('signupPassword','signupConfirm')"/>
               <button type="button" class="pw-toggle" onclick="togglePassword('signupPassword', this)">👁</button>
            </div>
         </div>
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Confirm Password</label>
            <div class="pw-wrap">
               <input type="password" id="signupConfirm" placeholder="Repeat password"
                      oninput="checkPwMatch('signupPassword','signupConfirm')"/>
               <button type="button" class="pw-toggle" onclick="togglePassword('signupConfirm', this)">👁</button>
            </div>
         </div>
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">I am a</label>
            <div class="role-selector">
               <label class="role-option" id="role-customer-label">
                  <input type="radio" name="userRole" id="role-customer" value="customer" checked/>
                  <div class="role-card">
                     <div class="role-icon">🛍️</div>
                     <div class="role-name">Customer</div>
                     <div class="role-desc">Browse &amp; order products</div>
                  </div>
               </label>
               <label class="role-option" id="role-owner-label">
                  <input type="radio" name="userRole" id="role-storeowner" value="storeowner"/>
                  <div class="role-card">
                     <div class="role-icon">🏪</div>
                     <div class="role-name">Business Partner</div>
                     <div class="role-desc">Sell products or manage appointments</div>
                  </div>
               </label>
            </div>
         </div>
         <button class="btn-primary" onclick="signUp()">Create Account</button>
      </div>

      <div class="mt-4 text-center">
         <p class="text-slate-400 text-sm">
            Already have an account? <a href="login.html" class="text-cyan-400 hover:text-cyan-300 font-semibold transition">Login here</a>
         </p>
      </div>
   </div>

   <!-- OTP Verification Card -->
   <div class="auth-card animated-border relative w-full max-w-sm rounded-2xl p-8 shadow-2xl"
        id="otpBox" style="display:none;background:rgba(15,23,42,0.75);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.12)">
      <div class="text-center mb-6">
         <div class="text-4xl mb-3">✉️</div>
         <h1 class="text-2xl font-black text-white tracking-tight">Verify Your Email</h1>
         <p class="text-slate-400 text-sm mt-1">We sent a 6-digit code to</p>
         <p class="text-cyan-400 font-bold text-sm mt-0.5" id="otpEmail"></p>
      </div>

      <div class="space-y-4">
         <div>
            <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Verification Code</label>
            <input type="text" id="otpCode" placeholder="Enter the code from your email"
                   maxlength="10" inputmode="numeric" autocomplete="one-time-code"
                   style="letter-spacing:0.2em;text-align:center;font-size:1.2rem"/>
         </div>
         <p id="otpError" class="error-msg hidden"></p>
         <button class="btn-primary" onclick="verifySignupOtp()">✅ Verify &amp; Create Account</button>
      </div>

      <div class="mt-4 text-center space-y-2">
         <p class="text-slate-400 text-sm">
            Didn't receive it? <a href="#" onclick="resendOtp(event)" class="text-cyan-400 hover:text-cyan-300 font-semibold transition">Resend code</a>
         </p>
         <p class="text-slate-400 text-sm">
            <a href="#" onclick="backToSignup(event)" class="text-cyan-400 hover:text-cyan-300 font-semibold transition">← Back to signup</a>
         </p>
      </div>
   </div>

   <script src="script.js"></script>
   <script>
      (function() {
         var v = document.querySelector('.auth-bg-video');
         if (!v) return;
         document.addEventListener('visibilitychange', function() {
            if (document.hidden) v.pause();
            else v.play().catch(function(){});
         });
      })();
   </script>
</body>
</html>
